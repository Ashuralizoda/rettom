<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qasr — Архитектурная соцсеть</title>
  <style>
    :root {
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --primary: #2a2a2a;
      --accent: #ff2a6d;
      --text: #333333;
      --border: #e0e0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); color: var(--text); line-height: 1.5; }
    header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 15px 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: var(--primary); }
    .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
    
    /* Форма создания поста */
    .create-post { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 25px; }
    .create-post input, .create-post textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }
    .create-post textarea { resize: vertical; height: 80px; }
    .create-post button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s; }
    .create-post button:hover { background: #444; }

    /* Лента постов */
    .feed { display: flex; flex-direction: column; gap: 20px; }
    .post { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .post-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f5f5f5; }
    .post-author { font-weight: bold; font-size: 15px; }
    .post-image { width: 100%; max-height: 400px; object-fit: cover; background: #eee; }
    .post-content { padding: 15px; }
    .post-title { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
    .post-desc { font-size: 14px; color: #555; }
    
    /* Кнопка Лайка */
    .post-actions { padding: 0 15px 15px; display: flex; gap: 15px; border-bottom: 1px solid #f5f5f5; }
    .like-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); padding: 6px 15px; border-radius: 20px; cursor: pointer; transition: all 0.2s; font-size: 14px; }
    .like-btn.active { border-color: var(--accent); background: #fff0f5; color: var(--accent); }
    .like-btn.active .like-icon { transform: scale(1.2); }
    .like-icon { transition: transform 0.2s; }

    /* Комментарии */
    .comments-section { padding: 15px; background: #fafafa; }
    .comments-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; max-height: 150px; overflow-y: auto; }
    .comment-item { font-size: 13px; line-height: 1.4; }
    .comment-author { font-weight: bold; margin-right: 5px; }
    .comment-form { display: flex; gap: 8px; }
    .comment-form input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
    .comment-form button { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    
    .loading { text-align: center; padding: 40px; color: #888; font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <h1>qasr</h1>
    <span style="font-size: 12px; color: #888; background: #eee; padding: 4px 8px; border-radius: 4px;">MVP</span>
  </header>

  <div class="container">
    <!-- Форма создания нового поста -->
    <div class="create-post">
      <input type="text" id="post-author" placeholder="Ваше имя / никнейм" required>
      <input type="text" id="post-title" placeholder="Название архитектурного объекта" required>
      <input type="url" id="post-image" placeholder="Ссылка на фото (https://...)" required>
      <textarea id="post-desc" placeholder="Описание проекта, материалы, архитектурный стиль..."></textarea>
      <button id="submit-post-btn">Опубликовать проект</button>
    </div>

    <!-- Контейнер ленты -->
    <div id="loading" class="loading">Синхронизация с базой данных...</div>
    <div id="feed" class="feed"></div>
  </div>

  <script>
    // Точный URL вашей базы данных Firebase Realtime Database
    const DB_URL = "https://qasr-app-e5t6b.fribaseio.com/posts.json";

    const feedContainer = document.getElementById('feed');
    const loadingElement = document.getElementById('loading');
    const submitBtn = document.getElementById('submit-post-btn');

    // Функция для выполнения HTTP-запросов к Firebase REST API
    async function makeRequest(path, method = 'GET', body = null) {
      const config = { method };
      if (body) {
        config.headers = { 'Content-Type': 'application/json' };
        config.body = JSON.stringify(body);
      }
      const response = await fetch(`${DB_URL}${path}`, config);
      if (!response.ok) throw new Error(`Ошибка запроса: ${response.status}`);
      return response.json();
    }

    // Добавление демо-данных, если база пустая (первый запуск)
    async function ensureDataExists(data) {
      if (!data) {
        const defaultData = {
          "first_post_id": {
            author: "QasrTeam",
            title: "Центр Гейдара Алиева",
            image: "unsplash.com",
            desc: "Пример деконструктивизма. Текучие формы и непрерывные линии фасада.",
            likes: { count: 1 },
            comments: {
              "c_init": { author: "Admin", text: "Добро пожаловать в архитектурную соцсеть qasr!" }
            }
          }
        };
        await makeRequest('/posts.json', 'PUT', defaultData);
        return defaultData;
      }
      return data;
    }

    // Основная функция загрузки и отображения ленты
    async function renderFeed() {
      try {
        loadingElement.style.display = 'block';
        let rawPosts = await makeRequest('/posts.json');
        rawPosts = await ensureDataExists(rawPosts);
        
        feedContainer.innerHTML = '';
        loadingElement.style.display = 'none';

        if (!rawPosts) return;

        // Перебираем посты в обратном порядке (новые сверху)
        Object.keys(rawPosts).reverse().forEach(id => {
          const post = rawPosts[id];
          const totalLikes = post.likes ? post.likes.count || 0 : 0;
          const userLiked = localStorage.getItem(`liked_${id}`) === 'true';

          let commentsBlock = '';
          if (post.comments) {
            Object.keys(post.comments).forEach(cid => {
              const comment = post.comments[cid];
              commentsBlock += `
                <div class="comment-item">
                  <span class="comment-author">${clean(comment.author)}:</span>
                  <span>${clean(comment.text)}</span>
                </div>`;
            });
          }

          const card = document.createElement('div');
          card.className = 'post';
          card.innerHTML = `
            <div class="post-header">
              <span class="post-author">@${clean(post.author)}</span>
            </div>
            <img class="post-image" src="${post.image}" alt="Проект" onerror="this.src='unsplash.com'">
            <div class="post-content">
              <h3 class="post-title">${clean(post.title)}</h3>
              <p class="post-desc">${clean(post.desc || '')}</p>
            </div>
            <div class="post-actions">
              <button class="like-btn ${userLiked ? 'active' : ''}" data-post-id="${id}">
                <span class="like-icon">❤</span>
                <span class="like-count">${totalLikes}</span>
              </button>
            </div>
            <div class="comments-section">
              <div class="comments-list" id="list-${id}">${commentsBlock}</div>
              <div class="comment-form">
                <input type="text" id="author-${id}" placeholder="Имя" required>
                <input type="text" id="text-${id}" placeholder="Ваш комментарий..." required>
                <button onclick="sendComment('${id}')">ОК</button>
              </div>
            </div>
          `;

          const btn = card.querySelector('.like-btn');
          btn.onclick = () => changeLikeState(id, btn);

          feedContainer.appendChild(card);
        });
      } catch (err) {
        loadingElement.textContent = "Ошибка. Проверьте соединение с Firebase или правила Read/Write.";
        console.error(err);
      }
    }

    // Логика переключения лайков
    async function changeLikeState(id, button) {
      const countLabel = button.querySelector('.like-count');
      let count = parseInt(countLabel.textContent) || 0;
      const alreadyLiked = button.classList.contains('active');

      if (alreadyLiked) {
        count = Math.max(0, count - 1);
        button.classList.remove('active');
        localStorage.removeItem(`liked_${id}`);
      } else {
        count += 1;
        button.classList.add('active');
        localStorage.setItem(`liked_${id}`, 'true');
      }
      countLabel.textContent = count;

      try {
        await makeRequest(`/posts/${id}/likes.json`, 'PUT', { count });
      } catch (error) {
        console.error("Сбой отправки лайка:", error);
      }
    }

    // Логика добавления комментариев
    async function sendComment(id) {
      const authorField = document.getElementById(`author-${id}`);
      const textField = document.getElementById(`text-${id}`);
      const author = authorField.value.trim();
      const text = textField.value.trim();

      if (!author || !text) return alert("Заполните оба поля комментария!");

      try {
        await makeRequest(`/posts/${id}/comments.json`, 'POST', { author, text });
        textField.value = '';
        
        const list = document.getElementById(`list-${id}`);
        list.innerHTML += `
          <div class="comment-item">
            <span class="comment-author">${clean(author)}:</span>
            <span>${clean(text)}</span>
          </div>`;
      } catch (error) {
        alert("Не удалось отправить комментарий.");
      }
    }

    // Логика отправки новой публикации
    submitBtn.addEventListener('click', async () => {
      const author = document.getElementById('post-author').value.trim();
      const title = document.getElementById('post-title').value.trim();
      const image = document.getElementById('post-image').value.trim();
      const desc = document.getElementById('post-desc').value.trim();

      if (!author || !title || !image) return alert("Заполните поля: Имя, Название и Ссылка на картинку!");

      const payload = { author, title, image, desc, likes: { count: 0 } };

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = "Отправка в облако...";
        
        await makeRequest('/posts.json', 'POST', payload);
        
        document.getElementById('post-title').value = '';
        document.getElementById('post-image').value = '';
        document.getElementById('post-desc').value = '';
        
        await renderFeed();
      } catch (err) {
        alert("Ошибка публикации!");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Опубликовать проект";
      }
    });

    // Защита от XSS инъекций
    function clean(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    document.addEventListener('DOMContentLoaded', renderFeed);
  </script>
</body>
</html>
