<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rettom — Социальная сеть нового поколения</title>
    <style>
        :root {
            --bg-main: #0f1419;
            --bg-card: #15181c;
            --bg-input: #202327;
            --accent: #1d9bf0;
            --accent-hover: #1a8cd8;
            --text-main: #eff3f4;
            --text-muted: #71767b;
            --border: #2f3336;
            --like: #f91880;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Экран авторизации */
        #auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            text-align: center;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .brand-subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 15px;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .auth-toggle {
            color: var(--accent);
            margin-top: 16px;
            font-size: 14px;
            cursor: pointer;
            display: inline-block;
        }

        /* Главный интерфейс приложения */
        #app-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(15, 20, 25, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .user-nav-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
        }

        /* Навигационные вкладки */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-muted);
            transition: background 0.2s;
        }

        .tab:hover {
            background: rgba(255,255,255,0.03);
        }

        .tab.active {
            color: var(--text-main);
            border-bottom: 4px solid var(--accent);
        }

        /* Создание нового поста */
        .feed-composer {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .composer-textarea {
            resize: none;
            height: 80px;
            background: transparent;
            border: none;
            padding: 0;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .composer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-input-label {
            color: var(--accent);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .file-input-label input {
            display: none;
        }

        .composer-btn {
            width: auto;
            padding: 8px 20px;
        }

        .preview-container img {
            max-height: 200px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: none;
        }

        /* Стили постов (Ленты) */
        .post-list, .network-container, .chat-container {
            display: flex;
            flex-direction: column;
        }

        .post-card {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-author {
            font-weight: bold;
        }

        .post-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .post-text {
            font-size: 15px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 16px;
            margin-top: 5px;
        }

        .post-footer {
            display: flex;
            gap: 30px;
            margin-top: 5px;
        }

        .action-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .action-item:hover {
            color: var(--text-main);
        }

        .action-item.liked {
            color: var(--like);
        }

        /* Блок комментариев */
        .comments-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }

        .comment-item {
            font-size: 13px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-author {
            font-weight: bold;
            margin-right: 5px;
        }

        .comment-input-block {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .comment-input-block input {
            margin-bottom: 0;
            padding: 6px 12px;
            font-size: 13px;
        }

        .comment-btn {
            width: auto;
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Подписки и Пользователи */
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .follow-btn {
            width: auto;
            padding: 6px 16px;
            font-size: 13px;
        }

        /* Секция Мессенджера (Чат) */
        .chat-layout {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 180px);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message-bubble.incoming {
            background: var(--bg-card);
            align-self: flex-start;
            border: 1px solid var(--border);
        }

        .message-bubble.outgoing {
            background: var(--accent);
            color: #fff;
            align-self: flex-end;
        }

        .message-meta {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            margin-bottom: 0;
        }

        .chat-send-btn {
            width: auto;
        }

        .view-section {
            display: none;
        }

        .view-section.active-view {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН АВТОРИЗАЦИИ И РЕГИСТРАЦИИ -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="brand-title">rettom</div>
            <div class="brand-subtitle">Делитесь моментами, мыслями и оставайтесь на связи</div>
            
            <h3 id="auth-title" style="margin-bottom: 20px;">Войти в аккаунт</h3>
            
            <input type="email" id="auth-email" placeholder="Электронная почта">
            <input type="password" id="auth-password" placeholder="Пароль">
            
            <button id="auth-submit-btn" onclick="handleAuthSubmit()">Войти</button>
            <span class="auth-toggle" id="auth-toggle-mode" onclick="toggleAuthMode()">Нет аккаунта? Зарегистрироваться</span>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН ПРИЛОЖЕНИЯ -->
    <div id="app-screen">
        <header>
            <div class="brand-title" style="font-size: 24px; margin-bottom: 0;">rettom</div>
            <div class="user-nav-info">
                <span id="nav-username" style="font-size: 14px; font-weight: bold;">@user</span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </header>

        <!-- Основная панель вкладок -->
        <div class="tabs">
            <div class="tab active" id="tab-feed" onclick="switchView('feed')">Лента</div>
            <div class="tab" id="tab-network" onclick="switchView('network')">Люди & Подписки</div>
            <div class="tab" id="tab-messages" onclick="switchView('messages')">Сообщения</div>
        </div>

        <!-- СЕКЦИЯ 1: ЛЕНТА ПОСТОВ -->
        <div id="view-feed" class="view-section active-view">
            <!-- Блок написания поста -->
            <div class="feed-composer">
                <textarea class="composer-textarea" id="post-text-input" placeholder="Что у вас нового?"></textarea>
                <div class="preview-container">
                    <img id="post-image-preview" src="" alt="Превью">
                </div>
                <div class="composer-actions">
                    <label class="file-input-label">
                        🖼️ Прикрепить фото
                        <input type="file" id="post-file-input" accept="image/*" onchange="previewImage(event)">
                    </label>
                    <button class="composer-btn" onclick="createNewPost()">Опубликовать</button>
                </div>
            </div>

            <!-- Контейнер вывода постов -->
            <div id="global-posts-list" class="post-list"></div>
        </div>

        <!-- СЕКЦИЯ 2: ПОДПИСЧИКИ И ДРУЗЬЯ -->
        <div id="view-network" class="view-section">
            <div class="tabs" style="border-bottom: 1px solid var(--border);">
                <div class="tab active" id="subtab-all" onclick="switchNetworkSubView('all')">Все люди</div>
                <div class="tab" id="subtab-following" onclick="switchNetworkSubView('following')">Мои подписки</div>
            </div>
            <div id="network-users-list" class="network-container">
                <!-- Сюда рендерятся пользователи -->
            </div>
        </div>

        <!-- СЕКЦИЯ 3: ЧАТЫ И МЕССЕНДЖЕР -->
        <div id="view-messages" class="view-section">
            <div style="padding: 10px; border-bottom: 1px solid var(--border);">
                <select id="chat-user-selector" onchange="loadActiveChat()">
                    <option value="">Выберите, кому написать...</option>
                </select>
            </div>
            <div class="chat-layout">
                <div class="chat-history" id="chat-messages-box">
                    <!-- Сообщения диалога -->
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-message-input" placeholder="Напишите сообщение...">
                    <button class="chat-send-btn" onclick="sendDirectMessage()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // НАСТРОЙКА КЛЮЧЕЙ И АДРЕСОВ (СТРОКИ ДЛЯ ВСТАВКИ ФИРБЕЙЗА)
        // =========================================================================
        const FIREBASE_API_KEY = "AIzaSyDl3SAgseXWdc4AEwFncZ0QDPWODNdcykY"; // СТРОКА 163: API Key для Firebase Auth
        const DATABASE_URL = "https://qasr-app-e5a6b-default-rtdb.firebaseio.com/"; // СТРОКА 164: Ссылка на Realtime Database

        // Внутреннее состояние приложения (State)
        let currentState = {
            isLoginMode: true,
            userToken: null,
            userId: null,
            userEmail: null,
            userNickname: null,
            posts: {},
            users: {},
            following: {},
            selectedChatUserId: null,
            activeView: 'feed',
            activeNetworkSubView: 'all',
            attachedBase64Image: null
        };

        // Инициализация при загрузке страницы
        window.addEventListener('DOMContentLoaded', () => {
            checkLocalSession();
            // Цикл мгновенных авто-обновлений базы данных (Лайки, посты, сообщения в реальном времени)
            startRealtimePolling();
        });

        // Проверка сессии (Вход 1 раз без повторного ввода пароля)
        function checkLocalSession() {
            const savedToken = localStorage.getItem('rettom_token');
            const savedUid = localStorage.getItem('rettom_uid');
            const savedEmail = localStorage.getItem('rettom_email');
            const savedNickname = localStorage.getItem('rettom_nickname');

            if (savedToken && savedUid) {
                currentState.userToken = savedToken;
                currentState.userId = savedUid;
                currentState.userEmail = savedEmail;
                currentState.userNickname = savedNickname;

                showAppScreen();
            } else {
                showAuthScreen();
            }
        }

        // Переключение режимов Вход / Регистрация
        function toggleAuthMode() {
            currentState.isLoginMode = !currentState.isLoginMode;
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-submit-btn');
            const toggleText = document.getElementById('auth-toggle-mode');

            if (currentState.isLoginMode) {
                title.innerText = "Войти в аккаунт";
                btn.innerText = "Войти";
                toggleText.innerText = "Нет аккаунта? Зарегистрироваться";
            } else {
                title.innerText = "Создать аккаунт";
                btn.innerText = "Зарегистрироваться";
                toggleText.innerText = "Уже есть аккаунт? Войти";
            }
        }

        // Авторизация / Регистрация через Firebase REST API
        async function handleAuthSubmit() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();

            if (!email || !password) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }

            const endpoint = currentState.isLoginMode ? 'signInWithPassword' : 'signUp';
            const url = `https://googleapis.com{endpoint}?key=${FIREBASE_API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ email, password, returnSecureToken: true }),
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || 'Ошибка аутентификации');
                }

                // Успешный вход / регистрация
                currentState.userToken = data.idToken;
                currentState.userId = data.localId;
                currentState.userEmail = data.email;
                currentState.userNickname = data.email.split('@')[0];

                // Сохранение сессии в LocalStorage надолго
                localStorage.setItem('rettom_token', data.idToken);
                localStorage.setItem('rettom_uid', data.localId);
                localStorage.setItem('rettom_email', data.email);
                localStorage.setItem('rettom_nickname', currentState.userNickname);

                // Если это регистрация, создаем профиль в базе данных
                if (!currentState.isLoginMode) {
                    await syncUserProfile();
                }

                showAppScreen();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        // Запись профиля юзера в Realtime Database
        async function syncUserProfile() {
            const url = `${DATABASE_URL}/users/${currentState.userId}.json?auth=${currentState.userToken}`;
            await fetch(url, {
                method: 'PUT',
                body: JSON.stringify({
                    uid: currentState.userId,
                    email: currentState.userEmail,
                    nickname: currentState.userNickname
                })
            });
        }

        function logout() {
            localStorage.clear();
            currentState.userToken = null;
            currentState.userId = null;
            showAuthScreen();
        }

        function showAuthScreen() {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
        }

        function showAppScreen() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            document.getElementById('nav-username').innerText = `@${currentState.userNickname}`;
            
            // Первичная подгрузка данных
            refreshData();
        }

        // Навигация между экранами SPA
        function switchView(viewName) {
            currentState.activeView = viewName;
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));

            if(viewName === 'feed') {
                document.getElementById('tab-feed').classList.add('active');
                document.getElementById('view-feed').classList.add('active-view');
            } else if(viewName === 'network') {
                document.getElementById('tab-network').classList.add('active');
                document.getElementById('view-network').classList.add('active-view');
                renderNetworkSection();
            } else if(viewName === 'messages') {
                document.getElementById('tab-messages').classList.add('active');
                document.getElementById('view-messages').classList.add('active-view');
                updateChatUserSelector();
            }
        }

        function switchNetworkSubView(subView) {
            currentState.activeNetworkSubView = subView;
            document.getElementById('subtab-all').classList.remove('active');
            document.getElementById('subtab-following').classList.remove('active');
            
            if(subView === 'all') {
                document.getElementById('subtab-all').classList.add('active');
            } else {
                document.getElementById('subtab-following').classList.add('active');
            }
            renderNetworkSection();
        }

        // Превью медиафайлов и Canvas-компрессор перед отправкой
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Сжатие на лету через холст (Canvas)
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Перевод в легкий формат base64 string
                    currentState.attachedBase64Image = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const previewElement = document.getElementById('post-image-preview');
                    previewElement.src = currentState.attachedBase64Image;
                    previewElement.style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Создание и публикация нового поста
        async function createNewPost() {
            const text = document.getElementById('post-text-input').value.trim();
            if (!text && !currentState.attachedBase64Image) {
                alert('Нельзя опубликовать пустой пост!');
                return;
            }

            const postData = {
                uid: currentState.userId,
                author: currentState.userNickname,
                text: text,
                image: currentState.attachedBase64Image || null,
                timestamp: Date.now(),
                likesCount: 0
            };

            try {
                const url = `${DATABASE_URL}/posts.json?auth=${currentState.userToken}`;
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify(postData)
                });

                if(response.ok) {
                    // Сброс полей ввода
                    document.getElementById('post-text-input').value = '';
                    document.getElementById('post-file-input').value = '';
                    const previewElement = document.getElementById('post-image-preview');
                    previewElement.src = '';
                    previewElement.style.display = 'none';
                    currentState.attachedBase64Image = null;
                    
                    refreshData();
                }
            } catch(e) {
                console.error("Ошибка добавления публикации", e);
            }
        }

        // Лайки в реальном времени с защитой от перезаписи
        async function toggleLike(postId) {
            const post = currentState.posts[postId];
            if (!post) return;

            // Проверяем, лайкал ли уже юзер этот пост раньше
            const likeStatusUrl = `${DATABASE_URL}/likes/${postId}/${currentState.userId}.json?auth=${currentState.userToken}`;
            const checkRes = await fetch(likeStatusUrl);
            const isLiked = await checkRes.json();

            let currentLikesCount = post.likesCount || 0;

            if (isLiked) {
                // Если лайк был — убираем его
                await fetch(likeStatusUrl, { method: 'DELETE' });
                currentLikesCount = Math.max(0, currentLikesCount - 1);
            } else {
                // Если лайка не было — ставим его
                await fetch(likeStatusUrl, { method: 'PUT', body: JSON.stringify(true) });
                currentLikesCount += 1;
            }

            // Обновляем счетчик лайков самого поста в БД
            const postLikeUrl = `${DATABASE_URL}/posts/${postId}/likesCount.json?auth=${currentState.userToken}`;
            await fetch(postLikeUrl, {
                method: 'PUT',
                body: JSON.stringify(currentLikesCount)
            });

            refreshData();
        }

        // Публикация комментариев к постам
        async function addComment(postId) {
            const commentInput = document.getElementById(`comment-input-${postId}`);
            const text = commentInput.value.trim();
            if(!text) return;

            const commentData = {
                author: currentState.userNickname,
                uid: currentState.userId,
                text: text,
                timestamp: Date.now()
            };

            const url = `${DATABASE_URL}/posts/${postId}/comments.json?auth=${currentState.userToken}`;
            await fetch(url, {
                method: 'POST',
                body: JSON.stringify(commentData)
            });

            commentInput.value = '';
            refreshData();
        }

        // Механизм подписок/фолловинга на других пользователей
        async function toggleFollow(targetUserId) {
            const isFollowing = currentState.following[targetUserId];
            const url = `${DATABASE_URL}/followers/${currentState.userId}/${targetUserId}.json?auth=${currentState.userToken}`;

            if(isFollowing) {
                await fetch(url, { method: 'DELETE' });
            } else {
                await fetch(url, { method: 'PUT', body: JSON.stringify(true) });
            }

            loadFollowingData();
        }

        // Загрузка связей подписок
        async function loadFollowingData() {
            if(!currentState.userId) return;
            const url = `${DATABASE_URL}/followers/${currentState.userId}.json?auth=${currentState.userToken}`;
            const res = await fetch(url);
            currentState.following = await res.json() || {};
            if(currentState.activeView === 'network') {
                renderNetworkSection();
            }
        }

        // Мессенджер: Отправка ЛС
        async function sendDirectMessage() {
            const text = document.getElementById('chat-message-input').value.trim();
            const receiverId = currentState.selectedChatUserId;

            if(!text || !receiverId) return;

            const msgData = {
                senderId: currentState.userId,
                senderName: currentState.userNickname,
                text: text,
                timestamp: Date.now()
            };

            // Создаем уникальный идентификатор комнаты для двух пользователей (лексикографический порядок)
            const chatRoomId = currentState.userId < receiverId 
                ? `${currentState.userId}_${receiverId}` 
                : `${receiverId}_${currentState.userId}`;

            const url = `${DATABASE_URL}/chats/${chatRoomId}.json?auth=${currentState.userToken}`;
            await fetch(url, {
                method: 'POST',
                body: JSON.stringify(msgData)
            });

            document.getElementById('chat-message-input').value = '';
            loadActiveChat();
        }

        // Загрузка сообщений текущего диалога
        async function loadActiveChat() {
            const selector = document.getElementById('chat-user-selector');
            currentState.selectedChatUserId = selector.value;
            const box = document.getElementById('chat-messages-box');

            if(!currentState.selectedChatUserId) {
                box.innerHTML = '<div style="color:var(--text-muted); text-align:center; margin-top:20px;">Выберите собеседника для начала беседы</div>';
                return;
            }

            const receiverId = currentState.selectedChatUserId;
            const chatRoomId = currentState.userId < receiverId 
                ? `${currentState.userId}_${receiverId}` 
                : `${receiverId}_${currentState.userId}`;

            const url = `${DATABASE_URL}/chats/${chatRoomId}.json?auth=${currentState.userToken}`;
            const res = await fetch(url);
            const messagesData = await res.json() || {};

            box.innerHTML = '';
            
            Object.keys(messagesData).forEach(key => {
                const msg = messagesData[key];
                const isMine = msg.senderId === currentState.userId;
                
                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${isMine ? 'outgoing' : 'incoming'}`;
                
                const date = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                bubble.innerHTML = `
                    <div style="font-size:11px; font-weight:bold; margin-bottom:2px;">${isMine ? 'Вы' : '@' + msg.senderName}</div>
                    <div>${msg.text}</div>
                    <div class="message-meta">${date}</div>
                `;
                box.appendChild(bubble);
            });

            box.scrollTop = box.scrollHeight;
        }

        // Обновление селектора пользователей в чате
        function updateChatUserSelector() {
            const selector = document.getElementById('chat-user-selector');
            const currentSelection = selector.value;

            Object.keys(currentState.users).forEach(uid => {

let isSignUpMode = false;

function toggleAuthMode() {
    isSignUpMode = !isSignUpMode;
    const titleEl = document.getElementById('auth-title');
    const submitBtn = document.getElementById('auth-submit-btn');
    const toggleLink = document.getElementById('auth-toggle-mode');

    if (isSignUpMode) {
        if (titleEl) titleEl.textContent = 'Регистрация профиля';
        if (submitBtn) submitBtn.textContent = 'Зарегистрироваться';
        if (toggleLink) toggleLink.textContent = 'Уже есть аккаунт? Войти';
    } else {
        if (titleEl) titleEl.textContent = 'Войти в аккаунт';
        if (submitBtn) submitBtn.textContent = 'Войти';
        if (toggleLink) toggleLink.textContent = 'Нет аккаунта? Зарегистрироваться';
    }
}

function handleAuthSubmit() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;

    if (!email || !password) {
        alert('Пожалуйста, заполните все поля!');
        return;
    }

    // ВСТАВЬТЕ СВОЙ API KEY ИЗ FIREBASE КОНФИГА В СТРОКУ НИЖЕ:
    const FIREBASE_API_KEY = "AIzaSyDl3SAgseXWdc4AEwFncZ0QDPWODNdcykY"; 
    
    const url = isSignUpMode 
    ? "https://identitoolkit.googleapis.com/v1/accounts:signUp?key=" + FIREBASE_API_KEY 
    : "https://identitoolkit.googleapis.com/v1/accounts:signinWithPassword?key" + FIREBASE_API_KEY;


    const submitBtn = document.getElementById('auth-submit-btn');
    submitBtn.textContent = 'Загрузка...';
    submitBtn.disabled = true;

    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, returnSecureToken: true })
    })
    .then(res => {
        if (!res.ok) throw res;
        return res.json();
    })
    .then(data => {
        localStorage.setItem('rettom_token', data.idToken);
        localStorage.setItem('rettom_uid', data.localId);
        localStorage.setItem('rettom_email', data.email);

        alert(isSignUpMode ? 'Регистрация успешна!' : 'Вход выполнен успешно!');
        
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        
        if (typeof initApp === 'function') initApp();
    })
    .catch(async err => {
        submitBtn.textContent = isSignUpMode ? 'Зарегистрироваться' : 'Войти';
        submitBtn.disabled = false;
        
        try {
            const errData = await err.json();
            alert('Ошибка Firebase: ' + errData.error.message);
        } catch(e) {
            alert('Ошибка сети или неверный API ключ!');
        }
    });
}
