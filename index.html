<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qasr — Универсальная соцсеть</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --border: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --heart: #ef4444;
      --bookmark: #eab308;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 60px; }
    
    header { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 15px 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 24px; font-weight: 900; letter-spacing: 1px; color: var(--text); }
    
    .container { max-width: 600px; margin: 20px auto; padding: 0 16px; }
    
    /* Главная навигация ленты */
    .feed-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .nav-tab { background: none; border: none; color: var(--text-muted); font-size: 15px; font-weight: 700; cursor: pointer; padding: 6px 12px; position: relative; transition: color 0.2s; }
    .nav-tab.active { color: var(--text); }
    .nav-tab.active::after { content: ''; position: absolute; bottom: -11px; left: 0; width: 100%; height: 3px; background: var(--accent); border-radius: 3px; }

    /* Новая универсальная форма публикации */
    .create-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 24px; }
    .create-card input, .create-card textarea { width: 100%; background: #0f172a; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 12px; }
    .create-card textarea { resize: vertical; height: 80px; margin-bottom: 8px; }
    
    .file-zone { position: relative; margin-bottom: 12px; }
    .file-label { display: block; background: #0f172a; border: 1px dashed var(--border); text-align: center; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px; color: var(--text-muted); transition: all 0.2s; }
    .file-label:hover { border-color: var(--accent); color: var(--text); }
    #post-file { display: none; }

    .submit-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; transition: background 0.2s; }
    .submit-btn:hover { background: var(--accent-hover); }
    .submit-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    /* Универсальная карточка поста */
    .feed { display: flex; flex-direction: column; gap: 20px; }
    .post { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    
    .post-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .post-user-info { display: flex; align-items: center; gap: 10px; }
    .post-author { font-weight: 700; font-size: 15px; color: var(--text); }
    
    /* Кнопка подписки (Дружить) */
    .follow-btn { background: #334155; color: var(--text); border: none; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .follow-btn.following { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .post-right-actions { display: flex; align-items: center; gap: 12px; }
    .delete-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }
    .delete-btn:hover { color: var(--heart); }
    
    .image-container { width: 100%; background: #0f172a; display: flex; align-items: center; justify-content: center; }
    .post-image { width: 100%; max-height: 500px; object-fit: cover; }
    
    .post-body { padding: 16px; }
    .post-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .post-desc { font-size: 14px; color: #cbd5e1; line-height: 1.5; }
    
    /* Новая панель действий (Лайк, Закладка) */
    .post-actions { padding: 0 16px 14px; display: flex; justify-content: space-between; align-items: center; }
    .left-actions { display: flex; gap: 10px; }
    
    .action-icon-btn { display: inline-flex; align-items: center; gap: 6px; background: #0f172a; border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s; font-size: 13px; font-weight: 600; }
    .action-icon-btn:hover { border-color: var(--text-muted); }
    .action-icon-btn.like-btn.active { border-color: var(--heart); background: rgba(239, 68, 68, 0.1); color: var(--heart); }
    .action-icon-btn.bookmark-btn.active { border-color: var(--bookmark); background: rgba(234, 179, 8, 0.1); color: var(--bookmark); }

    /* Секция комментариев */
    .comments-box { background: #151f32; border-top: 1px solid var(--border); padding: 14px 16px; }
    .comments-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; max-height: 160px; overflow-y: auto; }
    .comment-item { font-size: 13px; background: var(--card-bg); padding: 6px 10px; border-radius: 8px; border: 1px solid #1e293b; }
    .comment-user { font-weight: 700; color: var(--text); margin-right: 6px; }
    
    .comment-form { display: flex; gap: 8px; }
    .comment-form input { flex: 1; background: #0f172a; border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; font-size: 13px; outline: none; }
    .comment-form button { background: var(--accent); color: white; border: none; padding: 0 14px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; }

    .skeleton { text-align: center; padding: 50px; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>

  <header>
    <h1>qasr</h1>
    <div style="display: flex; align-items: center; gap: 10px;">
      <span id="user-profile-display" style="font-size: 13px; font-weight: 700; color: var(--accent);">@...</span>
      <button onclick="changeNickname()" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; text-decoration: underline;">Ник</button>
    </div>
  </header>

  <div class="container">
    <div id="auth-container" style="background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
  <h3 style="color: #fff; margin-top: 0;">Вход в QASR</h3>
  <input type="email" id="emailInput" placeholder="Email" style="padding: 8px; margin-right: 5px;">
  <input type="password" id="passwordInput" placeholder="Пароль" style="padding: 8px; margin-right: 5px;">
  <button id="registerBtn" style="padding: 8px 12px; margin-right: 5px; background: #28a745; color: #fff; border: none; cursor: pointer;">Регистрация</button>
  <button id="loginBtn" style="padding: 8px 12px; background: #007bff; color: #fff; border: none; cursor: pointer;">Войти</button>
</div><!-- Кнопка создания новой публикации -->
    <div class="create-card">
      <input type="text" id="post-title" placeholder="О чем ваш пост? (Заголовок)" required>
      <textarea id="post-desc" placeholder="Напишите текст, мысли, историю или новость..."></textarea>
      
      <div class="file-zone">
        <label for="post-file" id="file-label" class="file-label">📸 Добавить медиафайл (Фото)</label>
        <input type="file" id="post-file" accept="image/*">
      </div>
      
      <button id="submit-btn" class="submit-btn">Опубликовать пост</button>
    </div>

    <!-- Переключатель лент (Все / Подписки / Избранное) -->
    <div class="feed-nav">
      <button class="nav-tab active" onclick="switchTab('Все')">Все подряд</button>
      <button class="nav-tab" onclick="switchTab('Подписки')">Моя лента (Друзья)</button>
      <button class="nav-tab" onclick="switchTab('Избранное')">Закладки</button>
    </div>

    <!-- Лента постов -->
    <div id="loading" class="skeleton">Синхронизация глобальной ленты...</div>
    <div id="feed" class="feed"></div>
  </div>
 <div id="auth-container" style="background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
  <h3 style="color: #fff; margin-top: 0;">Вход в QASR</h3>
  <input type="email" id="emailInput" placeholder="Email" style="padding: 8px; margin-right: 5px;">
  <input type="password" id="passwordInput" placeholder="Пароль" style="padding: 8px; margin-right: 5px;">
  <button id="registerBtn" style="padding: 8px 12px; margin-right: 5px; background: #28a745; color: #fff; border: none; cursor: pointer;">Регистрация</button>
  <button id="loginBtn" style="padding: 8px 12px; background: #007bff; color: #fff; border: none; cursor: pointer;">Войти</button>
</div>
  <script>
    const DB_URL = "https://qasr-app-e5a6b-default-rtdb.firebaseio.com";

    let localPostsCache = {}; 
    let currentTab = 'Все'; // 'Все', 'Подписки', 'Избранное'
    let base64ImageData = "";
    let currentUserNickname = "";
   
    // DOM константы
    const feedContainer = document.getElementById('feed');
    const loadingElement = document.getElementById('loading');
    const submitBtn = document.getElementById('submit-btn');
    const fileInput = document.getElementById('post-file');
    const fileLabel = document.getElementById('file-label');

    // Нативный HTTP-клиент Firebase Realtime Database
    async function fbCtx(uri, type = 'GET', data = null) {
      const init = { method: type };
      if (data) {
        init.headers = { 'Content-Type': 'application/json' };
        init.body = JSON.stringify(data);
      }
      const res = await fetch(`${DB_URL}${uri}`, init);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }
const AUTH_API_KEY = "AIzaSyDl3SAgseXWdc4AEwFncZ0QDPWODNdcykY"; 

// Функция для регистрации нового аккаунта
document.getElementById('registerBtn').addEventListener('click', async () => {
  const email = document.getElementById('emailInput').value;
  const password = document.getElementById('passwordInput').value;

  try {
    const response = await fetch("https://googleapis.com" + AUTH_API_KEY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password, returnSecureToken: true })
    })

    const data = await response.json();
    if (!response.ok) throw new Error(data.error.message);

    alert("С возвращением в QASR!");
    localStorage.setItem('qasr_token', data.idToken);
  } catch (error) {
    alert("Ошибка входа: " + error.message);
  }
});
    // Логика инициализации профиля пользователя
    function initUserProfile() {
      let savedName = localStorage.getItem('qasr_username');
      while (!savedName || savedName.trim() === "") {
        savedName = prompt("Добро пожаловать в qasr! Создайте ваш никнейм для общения:");
        if (savedName) {
          savedName = savedName.trim().replace(/\s+/g, '_');
          localStorage.setItem('qasr_username', savedName);
        }
      }
      currentUserNickname = savedName;
      document.getElementById('user-profile-display').textContent = `@${currentUserNickname}`;
    }

    function changeNickname() {
      const newName = prompt("Введите новый никнейм:", currentUserNickname);
      if (newName && newName.trim() !== "") {
        currentUserNickname = newName.trim().replace(/\s+/g, '_');
        localStorage.setItem('qasr_username', currentUserNickname);
        document.getElementById('user-profile-display').textContent = `@${currentUserNickname}`;
        displayPosts(); 
      }
    }

    // Сжатие и обработка загружаемых картинок (чтобы работало на телефонах)
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      fileLabel.textContent = `Сжатие медиа...`;
      
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const MAX_WIDTH = 900;
          let width = img.width;
          let height = img.height;
          
          if (width > MAX_WIDTH) {
            height = Math.round((height * MAX_WIDTH) / width);
            width = MAX_WIDTH;
          }
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          
          base64ImageData = canvas.toDataURL('image/jpeg', 0.75);
          fileLabel.textContent = "✓ Медиафайл прикреплен";
          fileLabel.style.borderColor = "var(--accent)";
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Умная отрисовка универсальной ленты
    function displayPosts() {
      feedContainer.innerHTML = '';
      const keys = Object.keys(localPostsCache).reverse();
      let totalRendered = 0;

      keys.forEach(id => {
        const post = localPostsCache[id];
        if (!post) return;
        
        // Фильтрация вкладок
        const isMyPost = post.author === currentUserNickname;
        const iFollowAuthor = localStorage.getItem(`following_${post.author}`) === 'true';
        const isSavedByMe = localStorage.getItem(`bookmarked_${id}`) === 'true';

        if (currentTab === 'Подписки' && !iFollowAuthor && !isMyPost) return;
        if (currentTab === 'Избранное' && !isSavedByMe) return;

        totalRendered++;

        const totalLikes = post.likes ? post.likes.count || 0 : 0;
        const isLiked = localStorage.getItem(`liked_${id}`) === 'true';

        let commentsMarkup = '';
        if (post.comments) {
          Object.keys(post.comments).forEach(cid => {
            const comment = post.comments[cid];
            commentsMarkup += `
              <div class="comment-item">
                <span class="comment-user">@${secure(comment.author)}</span>
                <span class="comment-text">${secure(comment.text)}</span>
              </div>`;
          });
        }

        // Кнопка подписки (не показываем на своих постах)
        let followBtnMarkup = '';
        if (!isMyPost) {
          followBtnMarkup = iFollowAuthor 
            ? `<button class="follow-btn following" onclick="toggleFollow('${post.author}')">В друзьях</button>`
            : `<button class="follow-btn" onclick="toggleFollow('${post.author}')">+ Дружить</button>`;
        }

        // Если картинки нет, блок не рендерится
        const imageMarkup = post.image 
          ? `<div class="image-container"><img class="post-image" src="${post.image}" alt="Медиа"></div>` 
          : '';

        const card = document.createElement('div');
        card.className = 'post';
        card.innerHTML = `
          <div class="post-header">
            <div class="post-user-info">
              <span class="post-author">@${secure(post.author)}</span>
              ${followBtnMarkup}
            </div>
            <div class="post-right-actions">
              ${isMyPost ? `<button class="delete-btn" onclick="dropPost('${id}')">✕</button>` : ''}
            </div>
          </div>
          ${imageMarkup}
          <div class="post-body">
            <h2 class="post-title">${secure(post.title)}</h2>
            <p class="post-desc">${secure(post.desc || '')}</p>
          </div>
          <div class="post-actions">
            <div class="left-actions">
              <button class="action-icon-btn like-btn ${isLiked ? 'active' : ''}" onclick="handleLike('${id}', this)">
                <span>❤</span> <span class="like-count">${totalLikes}</span>
              </button>
            </div>
            <button class="action-icon-btn bookmark-btn ${isSavedByMe ? 'active' : ''}" onclick="handleBookmark('${id}', this)">
              <span>🔖</span>
            </button>
          </div>
          <div class="comments-box">
            <div class="comments-list" id="box-${id}">${commentsMarkup}</div>
            <div class="comment-form">
              <input type="text" id="t-${id}" placeholder="Написать комментарий..." required>
              <button onclick="handleComment('${id}')">Отправить</button>
            </div>
          </div>
        `;
        feedContainer.appendChild(card);
      });

      if (totalRendered === 0) {
        feedContainer.innerHTML = `<div class="skeleton">Здесь пока пусто. Поменяйте вкладку ленты выше.</div>`;
      }
    }

    // Переключение вкладок верхнего меню
    function switchTab(tabName) {
      currentTab = tabName;
      document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(tabName) || (tabName === 'Все' && btn.textContent === 'Все подряд'));
      });
      displayPosts();
    }

    // Логика подписок (Дружбы)
    function toggleFollow(authorName) {
      const isFollowing = localStorage.getItem(`following_${authorName}`) === 'true';
      if (isFollowing) {
        localStorage.removeItem(`following_${authorName}`);
      } else {
        localStorage.setItem(`following_${authorName}`, 'true');
      }
      displayPosts(); // Перерисовываем ленту, чтобы обновить кнопки
    }

    // Логика Избранного (Закладок)
    function handleBookmark(id, button) {
      const isBookmarked = button.classList.contains('active');
      if (isBookmarked) {
        button.classList.remove('active');
        localStorage.removeItem(`bookmarked_${id}`);
      } else {
        button.classList.add('active');
        localStorage.setItem(`bookmarked_${id}`, 'true');
      }
      if (currentTab === 'Избранное') displayPosts(); // Скрываем из ленты закладок сразу
    }

    // Загрузка данных с сервера
    async function syncFeed() {
      try {
        loadingElement.style.display = 'block';
        const serverData = await fbCtx('/posts.json');
        localPostsCache = serverData || {};
        loadingElement.style.display = 'none';
        displayPosts();
      } catch (err) {
        loadingElement.textContent = "Ошибка обновления ленты.";
        console.error(err);
      }
    }

    // Реактивный цикл лайка
    async function handleLike(id, button) {
      const countNode = button.querySelector('.like-count');
      let currentVal = parseInt(countNode.textContent) || 0;
      const isPressed = button.classList.contains('active');

      if (isPressed) {
        currentVal = Math.max(0, currentVal - 1);
        button.classList.remove('active');
        localStorage.removeItem(`liked_${id}`);
      } else {
        currentVal += 1;
        button.classList.add('active');
        localStorage.setItem(`liked_${id}`, 'true');
      }
      countNode.textContent = currentVal;
      
      if (localPostsCache[id]) {
        if (!localPostsCache[id].likes) localPostsCache[id].likes = {};
        localPostsCache[id].likes.count = currentVal;
      }
      try {
        await fbCtx(`/posts/${id}/likes.json`, 'PUT', { count: currentVal });
      } catch (e) { console.error(e); }
    }

    // Добавление комментариев
    async function handleComment(id) {
      const tNode = document.getElementById(`t-${id}`);
      const text = tNode.value.trim();
      if (!text) return alert("Введите текст сообщения!");

      const payload = { author: currentUserNickname, text };

      try {
        const res = await fbCtx(`/posts/${id}/comments.json`, 'POST', payload);
        if (!localPostsCache[id].comments) localPostsCache[id].comments = {};
        localPostsCache[id].comments[res.name] = payload;

        tNode.value = '';
        const box = document.getElementById(`box-${id}`);
        box.innerHTML += `
          <div class="comment-item">
            <span class="comment-user">@${secure(currentUserNickname)}</span>
            <span class="comment-text">${secure(text)}</span>
          </div>`;
        box.scrollTop = box.scrollHeight;
      } catch (e) { alert("Ошибка публикации комментария."); }
    }

    // Удаление поста
    async function dropPost(id) {
      if (!confirm("Вы уверены, что хотите удалить этот пост?")) return;
      try {
        await fbCtx(`/posts/${id}.json`, 'DELETE');
        delete localPostsCache[id];
        displayPosts();
      } catch (e) { alert("Не удалось удалить пост."); }
    }

    // Создание универсального поста
    submitBtn.addEventListener('click', async () => {
      const title = document.getElementById('post-title').value.trim();
      const desc = document.getElementById('post-desc').value.trim();

      if (!title) return alert("Пожалуйста, заполните заголовок поста!");

      const newPost = {
        author: currentUserNickname,
        title,
        desc,
        image: base64ImageData || "", // Картинка теперь необязательна
        likes: { count: 0 }
      };

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = "Публикация в сеть...";
        
        await fbCtx('/posts.json', 'POST', newPost);
        
        document.getElementById('post-title').value = '';
        document.getElementById('post-desc').value = '';
        base64ImageData = "";
        fileInput.value = "";
        fileLabel.textContent = "📸 Добавить медиафайл (Фото)";
        fileLabel.style.borderColor = "var(--border)";
        
        await syncFeed();
      } catch (err) {
        alert("Ошибка сети при публикации.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Опубликовать пост";
      }
    });

    function secure(input) {
      if (!input) return '';
      return input.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    // ВСТАВЬТЕ ЭТОТ ОБНОВЛЕННЫЙ БЛОК ДЛЯ ЖИВОЙ ЛЕНТЫ:
// ТОЧНЫЙ КОД ДЛЯ ЗАМЕНЫ В САМОМ НИЗУ ФАЙЛА:
document.addEventListener('DOMContentLoaded', () => {
  initUserProfile(); // Инициализируем никнейм пользователя
  
  // Подключаем стрим данных без дублирования протоколов
  const eventSource = new EventSource(`${DB_URL}/posts.json`);
  
  // Слушаем любые изменения в базе данных qasr
  eventSource.addEventListener('put', (event) => {
    try {
      const parseData = JSON.parse(event.data);
      
      if (parseData.path === "/") {
        localPostsCache = parseData.data || {};
      } else {
        const pathParts = parseData.path.split('/');
        const postId = pathParts[1];
        
        if (postId) {
          if (!localPostsCache[postId]) localPostsCache[postId] = {};
          
          if (pathParts.length === 2) {
            localPostsCache[postId] = parseData.data;
          } else if (pathParts[2] === 'likes') {
            localPostsCache[postId].likes = parseData.data;
          } else if (pathParts[2] === 'comments') {
            localPostsCache[postId].comments = parseData.data;
          }
        }
      }
      
      loadingElement.style.display = 'none';
      displayPosts();
      
    } catch (error) {
      console.error("Ошибка обработки живых данных:", error);
    }
  });

  eventSource.onerror = () => {
    console.log("Потеря связи с Firebase. Переподключение...");
  };
});

  </script>
